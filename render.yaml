services:
  - type: web
    name: zaahir-tutor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port 10000
    envVars:
      - key: USE_GROQ
        value: "true"
      - key: CHROMA_DB_PATH
        value: /tmp/vectordb
      - key: DOCUMENTS_PATH
        value: /tmp/documents

